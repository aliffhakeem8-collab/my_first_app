<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KBFC | Players</title>
<link rel="icon" type="image/png" href="/images/Favicon.png">
<link rel="apple-touch-icon" href="/images/Favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FAFAF8;
    --surface:#FFFFFF;
    --ink:#14171C;
    --muted:#6B7280;
    --accent:#b91321;
    --line: rgba(20,23,28,0.12);
    --line-soft: rgba(20,23,28,0.06);
    --shadow: 0 20px 60px rgba(20,23,28,0.10);
  }
  html[data-theme="dark"]{
    --bg:#0D0F12;
    --surface:#15181D;
    --ink:#F2F1EC;
    --muted:#9CA3AF;
    --accent:#b91321;
    --line: rgba(242,241,236,0.14);
    --line-soft: rgba(242,241,236,0.07);
    --shadow: 0 20px 60px rgba(0,0,0,0.45);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
    transition:background .35s ease, color .35s ease;
  }
  .mono{font-family:'JetBrains Mono',monospace; letter-spacing:0.06em;}

  /* ---------- topbar ---------- */
  .topbar{
    position:fixed; top:0; left:0; right:0; z-index:50;
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 32px;
    background:var(--bg);
    border-bottom:1px solid var(--line);
    color:var(--ink);
    transition:background .35s ease, border-color .35s ease;
  }
  .brand-wrap{ display:flex; flex-direction:column; gap:6px; }
  .brand{
    cursor:pointer; display:flex; align-items:center; gap:10px;
    font-size:14px; font-weight:600; letter-spacing:0.08em;
  }
  .brand:hover{ opacity:.85; }
  .brand-logo{ width:24px; height:24px; object-fit:contain; }
  .brand span{font-family:'JetBrains Mono',monospace;}

  .social-row{ display:flex; align-items:center; gap:10px; padding-left:2px; }
  .social-icon{
    color:var(--muted); display:flex; opacity:.85;
    transition:color .2s ease, opacity .2s ease;
  }
  .social-icon:hover{ color:var(--accent); opacity:1; }
  .social-icon svg{ width:16px; height:16px; }

  /* ---------- hamburger drawer ---------- */
  .topbar-actions{display:flex; align-items:center; gap:14px; position:relative;}
  .menu-overlay{
    position:fixed; inset:0; background:rgba(0,0,0,0.45);
    opacity:0; pointer-events:none;
    transition:opacity .3s ease;
    z-index:1000;
  }
  .menu-overlay.active{ opacity:1; pointer-events:auto; }
  .topbar-menu{
    position:fixed; top:0; right:0; bottom:0;
    width:320px; max-width:82vw;
    background:var(--surface); border-left:1px solid var(--line);
    display:flex; flex-direction:column;
    padding:22px 22px 28px;
    transform:translateX(100%);
    transition:transform .32s ease;
    z-index:1001;
    overflow-y:auto;
  }
  .topbar-menu.active{ transform:translateX(0); }
  .topbar-menu-head{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:18px; padding-bottom:16px;
    border-bottom:1px solid var(--line);
  }
  .topbar-menu-head span{
    font-family:'Oswald',sans-serif; font-weight:600; font-size:14px;
    letter-spacing:.04em; text-transform:uppercase; color:var(--muted);
  }
  .menu-close-btn{
    width:34px; height:34px; border-radius:50%; border:1px solid var(--line);
    background:transparent; color:var(--ink); cursor:pointer;
    display:flex; align-items:center; justify-content:center;
  }
  .menu-close-btn svg{ width:15px; height:15px; stroke:currentColor; fill:none; stroke-width:2; }
  .btn-mini{
    display:inline-flex; align-items:center; gap:8px;
    border:1px solid var(--line);
    background:transparent; color:var(--ink);
    padding:9px 16px; border-radius:999px;
    font-family:'Inter',sans-serif; font-size:12.5px; font-weight:600;
    letter-spacing:0.01em; cursor:pointer;
    transition:transform .2s ease, border-color .25s ease;
    outline:none; text-decoration:none;
  }
  .btn-mini:hover{transform:translateY(-1px); border-color:var(--accent);}
  .btn-mini:focus-visible{ border-color:var(--accent); }
  .btn-mini svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2.4;}
  .topbar-menu .btn-mini{
    width:100%; justify-content:flex-start; gap:12px;
    font-size:14px !important; padding:16px 4px;
    border:none; border-radius:0;
    border-bottom:1px solid var(--line);
  }
  .topbar-menu .btn-mini svg{ width:16px; height:16px; }
  .menu-group-label{
    font-size:10.5px; font-weight:700; letter-spacing:.08em;
    color:var(--accent); text-transform:uppercase;
    padding:16px 4px 6px;
  }
  .topbar-menu .menu-group-label:first-of-type{ padding-top:4px; }
  .topbar-menu .btn-mini:disabled{
    cursor:not-allowed; opacity:.5;
  }
  .menu-item-soon{ font-size:10px; opacity:.8; margin-left:2px; }
  .btn-mini.menu-toggle-btn{
    display:flex; width:40px; height:40px; padding:0;
    align-items:center; justify-content:center; border-radius:50%;
  }
  .menu-toggle-btn svg{ width:16px; height:16px; }

  .theme-toggle{
    width:40px;height:40px;border-radius:50%;
    border:1px solid var(--line);
    background:transparent;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    color:var(--ink);
  }
  .theme-toggle svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.6;}
  .theme-toggle .moon{display:none;}
  html[data-theme="dark"] .theme-toggle .sun{display:none;}
  html[data-theme="dark"] .theme-toggle .moon{display:block;}

  /* ---------- squad hero (background photo, matches the reference) ---------- */
  .squad-hero{
    position:relative;
    min-height:560px;
    display:flex; flex-direction:column; justify-content:flex-end;
    padding:110px 6vw 32px;
    background:
      linear-gradient(180deg, rgba(10,10,10,.25), rgba(10,10,10,.92) 88%),
      repeating-linear-gradient(135deg, #1b1b1b, #1b1b1b 22px, #232323 22px, #232323 44px);
    background-size:cover; background-position:center;
    color:#fff;
  }
  /* Swap in a real squad photo when you have one:
     .squad-hero{ background-image: linear-gradient(...), url('/images/squad-hero.jpg'); } */
  .squad-eyebrow{
    font-size:11.5px; font-weight:600; letter-spacing:.1em;
    color:var(--accent); text-transform:uppercase; margin-bottom:12px;
  }
  .squad-hero h1{
    font-family:'Oswald',sans-serif; font-size:clamp(36px,6vw,58px);
    font-weight:600; letter-spacing:-0.01em; color:#fff;
  }

  /* ---------- position filter dropdown ---------- */
  .filter-bar{ padding:22px 6vw; }
  .filter-dropdown{ position:relative; display:inline-block; }
  .filter-toggle{
    display:inline-flex; align-items:center; gap:8px;
    border:1px solid var(--line); background:var(--bg); color:var(--ink);
    padding:10px 16px; border-radius:999px; font-size:13px; font-weight:600;
    cursor:pointer; font-family:'Inter',sans-serif;
  }
  .filter-toggle svg{ width:14px; height:14px; stroke:currentColor; fill:none; stroke-width:2; }
  .filter-toggle .chev{ transition:transform .2s ease; margin-left:2px; }
  .filter-dropdown.open .filter-toggle .chev{ transform:rotate(180deg); }
  .filter-menu{
    position:absolute; top:calc(100% + 6px); left:0; min-width:160px;
    background:var(--surface); border:1px solid var(--line);
    box-shadow:var(--shadow);
    opacity:0; visibility:hidden; transform:translateY(-4px);
    transition:opacity .15s ease, transform .15s ease;
    z-index:20;
  }
  .filter-dropdown.open .filter-menu{ opacity:1; visibility:visible; transform:translateY(0); }
  .filter-option{
    display:block; width:100%; text-align:left;
    padding:11px 16px; border:none; background:transparent; color:var(--ink);
    font-size:13px; cursor:pointer; font-family:'Inter',sans-serif;
    border-bottom:1px solid var(--line);
  }
  .filter-option:last-child{ border-bottom:none; }
  .filter-option:hover{ background:var(--bg); }
  .filter-option.active{ color:var(--accent); font-weight:600; }

  /* ---------- squad sections + card grid ---------- */
  .squad-section{ padding:0 6vw 8px; }
  #squadSections{ padding-bottom:80px; }
  .squad-section-title{
    font-family:'Oswald',sans-serif; font-size:clamp(26px,3.4vw,38px);
    font-weight:600; margin:36px 0 18px;
  }
  .squad-loading{
    font-size:12px; color:var(--muted); text-transform:uppercase;
    letter-spacing:.06em; margin:40px 0;
  }
  .player-grid{
    display:grid; grid-template-columns:repeat(auto-fill, minmax(180px, 220px));
    justify-content:center;
    gap:16px;
  }
  .player-card{
    position:relative; aspect-ratio:3/4; overflow:hidden;
    background:var(--surface); cursor:pointer;
    border-radius:10px; border:1px solid var(--line);
  }
  .player-photo, .player-gif{
    position:absolute; inset:0; width:100%; height:100%;
    object-fit:cover; transition:opacity .35s ease;
  }
  .player-gif{ opacity:0; }
  .player-card:hover .player-gif{ opacity:1; }
  .player-card:hover .player-photo{ opacity:0; }
  .card-overlay{
    position:absolute; left:0; right:0; bottom:0;
    padding:18px;
    background:linear-gradient(180deg, transparent, rgba(0,0,0,.8));
    color:#fff;
  }
  .card-number{
    font-family:'Oswald',sans-serif; font-weight:700; font-size:clamp(28px,4vw,44px);
    line-height:1; margin-bottom:6px;
  }
  .card-name{
    font-family:'Oswald',sans-serif; font-weight:600; font-size:clamp(13px,1.6vw,16px);
  }

  @media (max-width:780px){
    .topbar{ padding:18px 20px; }
    .squad-hero{ padding:90px 6vw 28px; min-height:420px; }
    .filter-bar{ padding:16px 20px; }
    .squad-section{ padding:0 20px 8px; }
    #squadSections{ padding-bottom:48px; }
    .player-grid{ gap:12px; }
    .topbar-menu{
      top:0; left:0; right:0; bottom:auto;
      width:100%; max-width:100%;
      max-height:85vh;
      border-left:none; border-bottom:1px solid var(--line);
      transform:translateY(-100%);
      transition:transform .35s cubic-bezier(.4,0,.2,1);
      overflow-y:auto;
      padding:20px 20px 26px;
    }
    .topbar-menu.active{
      transform:translateY(0);
    }
  }
  @media (max-width:520px){
    .card-overlay{ padding:12px; }
  }

  /* ---------- footer ---------- */
  footer{
    display:flex; justify-content:space-between; align-items:flex-end;
    padding:26px 6vw; border-top:1px solid var(--line);
    font-size:12px; color:var(--muted);
  }
  .footer-brand{ display:flex; align-items:center; gap:16px; }
  .footer-right{
    display:flex; align-items:center; gap:16px;
  }
  .footer-credit-label{
    text-transform:uppercase;
    color:var(--muted);
  }
  .footer-logos{ display:flex; align-items:center; gap:18px; }
  .footer-logos a{ display:inline-flex; line-height:0; }
  .footer-logos img{
    height:22px; width:auto; object-fit:contain;
    filter:grayscale(1) invert(1); opacity:.75;
    transition:filter .25s ease, opacity .25s ease, transform .25s ease;
  }
  html[data-theme="dark"] .footer-logos img{
    filter:grayscale(1) brightness(1.6); opacity:.85;
  }
  .footer-logos a:hover img{
    filter:none; opacity:1; transform:translateY(-1px);
  }
  @media (max-width:780px){
    .footer-brand{ flex-direction:column; align-items:flex-start; gap:12px; }
    .footer-right{ flex-direction:column; align-items:center; gap:12px; }
    .footer-logos{ gap:16px; }
  }
</style>
</head>

<script>
  /* ---------------- THEME TOGGLE (matches index.html) ---------------- */
  const root = document.documentElement;
  const themeToggle = document.getElementById('themeToggle');
  const savedTheme = localStorage.getItem('kit-theme');
  if(savedTheme){ root.setAttribute('data-theme', savedTheme); }
  themeToggle.addEventListener('click', () => {
    const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    root.setAttribute('data-theme', next);
    localStorage.setItem('kit-theme', next);
  });

  document.getElementById('brandHome').addEventListener('click', () => { window.location.href = '/'; });

  /* ---------------- MOBILE TOPBAR MENU (hamburger / slide-in drawer) ---------------- */
  const menuToggleBtn = document.getElementById('menuToggleBtn');
  const menuCloseBtn = document.getElementById('menuCloseBtn');
  const topbarMenu = document.getElementById('topbarMenu');
  const menuOverlay = document.getElementById('menuOverlay');

  function lockBodyScroll(){
    const scrollbarWidth = window.innerWidth - document.documentElement.clientWidth;
    document.body.style.overflow = 'hidden';
    if(scrollbarWidth > 0) document.body.style.paddingRight = scrollbarWidth + 'px';
  }
  function unlockBodyScroll(){
    document.body.style.overflow = '';
    document.body.style.paddingRight = '';
  }
  function closeTopbarMenu(){
    topbarMenu.classList.remove('active');
    menuOverlay.classList.remove('active');
    menuToggleBtn.setAttribute('aria-expanded', 'false');
    unlockBodyScroll();
  }
  function toggleTopbarMenu(){
    const nowOpen = topbarMenu.classList.toggle('active');
    menuOverlay.classList.toggle('active', nowOpen);
    menuToggleBtn.setAttribute('aria-expanded', String(nowOpen));
    if(nowOpen) lockBodyScroll(); else unlockBodyScroll();
  }
  menuToggleBtn.addEventListener('click', (e)=>{
    e.stopPropagation();
    toggleTopbarMenu();
  });
  menuCloseBtn.addEventListener('click', closeTopbarMenu);
  menuOverlay.addEventListener('click', closeTopbarMenu);
  topbarMenu.addEventListener('click', (e)=>{
    if(e.target.closest('.btn-mini')) closeTopbarMenu();
  });
  document.addEventListener('keydown', (e)=>{
    if(e.key === 'Escape') closeTopbarMenu();
  });
  // Already on the Players page, so this just closes the drawer and
  // scrolls to the squad list instead of reloading the page on itself.
  document.getElementById('playersBtnTop').addEventListener('click', ()=>{
    closeTopbarMenu();
    document.querySelector('.filter-bar').scrollIntoView({behavior:'smooth', block:'start'});
  });

  /* ---------------- SQUAD DATA ----------------
     Pulled live from a Google Sheet — no code editing needed to update
     the roster. See setup notes at the very bottom of this file for how
     to create and connect the sheet.

     SHEET_ID: the long ID in your sheet's URL, e.g.
       https://docs.google.com/spreadsheets/d/COPY_THIS_PART/edit
     SHEET_TAB: the exact name of the tab holding the roster (bottom of
       the spreadsheet window — rename it to "Players" or change this
       to match).

     Sheet must have these exact column headers in row 1:
       Number | Name | Position | Photo | GIF
     - Position must be exactly: Goalkeeper, Defender, Midfielder, or Forward
     - Photo / GIF are just filenames (e.g. "10-photo.jpg") that live in
       your images/players/ folder — upload the actual files there. */
  const SHEET_ID = '1VSTIn7kl7nddpGhq1CsUIFz_q2DhiTq2tHe_cxzWVlM';
  const SHEET_TAB = 'Players';
  const PLAYER_IMAGE_BASE = '/images/players/';

  // Used only if the sheet can't be reached (not shared publicly yet,
  // wrong ID still pasted in, offline, etc.) so the page never shows up
  // empty or broken while you're setting things up.
  const FALLBACK_SQUAD = [
    { number: 1,  name: 'Player One',   position: 'Goalkeeper', photo: '01-photo.jpg', gif: '01-move.gif' },
    { number: 10, name: 'Player Two',   position: 'Forward',    photo: '10-photo.jpg', gif: '10-move.gif' },
  ];

  let squad = [];

  async function fetchSquadFromSheet(){
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_TAB)}`;
    const res = await fetch(url);
    if(!res.ok) throw new Error('Sheet request failed: ' + res.status);
    const text = await res.text();
    // Google wraps the JSON in `google.visualization.Query.setResponse(...)` — strip that off.
    const json = JSON.parse(text.slice(text.indexOf('{'), text.lastIndexOf('}') + 1));
    const rows = (json.table && json.table.rows) || [];

    return rows
      .map(r => {
        const cells = r.c || [];
        const val = i => (cells[i] ? cells[i].v : '');
        return {
          number: Number(val(0)),
          name: String(val(1) || '').trim(),
          position: String(val(2) || '').trim(),
          photo: PLAYER_IMAGE_BASE + String(val(3) || '').trim(),
          gif: PLAYER_IMAGE_BASE + String(val(4) || '').trim(),
        };
      })
      .filter(p => p.number && p.name && p.position);
  }

  // Order sections appear in, top to bottom.
  const GROUP_ORDER = ['Forward', 'Midfielder', 'Defender', 'Goalkeeper'];

  const squadSections = document.getElementById('squadSections');

  function initials(name){
    return name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
  }

  // Builds a simple placeholder SVG data-URI (initials on a flat panel) so
  // cards look complete before real photos/gifs are added. Swap the
  // `photo` / `gif` fields above with real file paths and this fallback
  // is never used once those files exist.
  function placeholderSrc(label){
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="400" height="520">
      <rect width="100%" height="100%" fill="#c8cdd4"/>
      <text x="50%" y="52%" font-family="Oswald, sans-serif" font-size="72" font-weight="600"
        fill="#ffffff" text-anchor="middle" dominant-baseline="middle">${label}</text>
    </svg>`;
    return 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg)));
  }

  function cardHtml(p){
    return `
      <div class="player-card">
        <img class="player-photo" src="${p.photo}" alt="${p.name}"
             onerror="this.onerror=null; this.src='${placeholderSrc(initials(p.name))}';">
        <img class="player-gif" src="${p.gif}" alt="" loading="lazy"
             onerror="this.onerror=null; this.src='${placeholderSrc('&#9654;')}';">
        <div class="card-overlay">
          <div class="card-number mono">${p.number}</div>
          <div class="card-name">${p.name}</div>
        </div>
      </div>
    `;
  }

  function renderSquad(filter){
    const groups = {};
    squad.forEach(p => { (groups[p.position] = groups[p.position] || []).push(p); });

    let html = '';
    GROUP_ORDER.forEach(position => {
      if(filter !== 'all' && filter !== position) return;
      const players = groups[position] || [];
      if(!players.length) return;
      html += `
        <div class="squad-section">
          <h2 class="squad-section-title">${position}s</h2>
          <div class="player-grid">${players.map(cardHtml).join('')}</div>
        </div>
      `;
    });
    squadSections.innerHTML = html;
  }

  let currentFilter = 'all';

  squadSections.innerHTML = `<div class="squad-section"><p class="squad-loading mono">Loading squad…</p></div>`;

  fetchSquadFromSheet()
    .then(rows => {
      if(!rows.length) throw new Error('Sheet returned no rows');
      squad = rows;
    })
    .catch(err => {
      console.warn('Could not load squad from the sheet — showing placeholder roster instead.', err);
      squad = FALLBACK_SQUAD;
    })
    .finally(() => {
      renderSquad(currentFilter);
    });

  /* ---------------- FILTER DROPDOWN ---------------- */
  const filterDropdown = document.getElementById('filterDropdown');
  const filterToggle = document.getElementById('filterToggle');
  const filterMenu = document.getElementById('filterMenu');
  const filterLabel = document.getElementById('filterLabel');

  filterToggle.addEventListener('click', (e)=>{
    e.stopPropagation();
    filterDropdown.classList.toggle('open');
  });
  filterMenu.addEventListener('click', (e)=>{
    const opt = e.target.closest('.filter-option');
    if(!opt) return;
    document.querySelectorAll('.filter-option').forEach(o => o.classList.remove('active'));
    opt.classList.add('active');
    filterLabel.textContent = opt.textContent;
    filterDropdown.classList.remove('open');
    currentFilter = opt.dataset.filter;
    renderSquad(currentFilter);
  });
  document.addEventListener('click', (e)=>{
    if(!filterDropdown.contains(e.target)) filterDropdown.classList.remove('open');
  });
</script>
</body>
